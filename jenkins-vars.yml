---

# jenkins variables
project_name: docker-dolphin
external_type: na
custom_version_command: |
  curl -sL 'https://raw.githubusercontent.com/flathub/org.DolphinEmu.dolphin-emu/refs/heads/master/org.DolphinEmu.dolphin-emu.metainfo.xml' | awk -F'(<release version="|")' '/release version/ {print $2;exit}'
release_type: stable
release_tag: latest
ls_branch: master
build_armhf: false
repo_vars:
  - BUILD_VERSION_ARG = 'DOLPHIN_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-dolphin'
  - CONTAINER_NAME = 'dolphin'
  - DOCKERHUB_IMAGE = 'linuxserver/dolphin'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/dolphin'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/dolphin'
  - DIST_IMAGE = 'ubuntu'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = 'TZ=US/Pacific'
  - CI_AUTH = 'user:password'
  - CI_WEBPATH = ''
